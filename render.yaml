services:
  - type: web
    name: Zerodha-clone-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false

  - type: web
    name: Zerodha-clone-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: REACT_APP_API_URL
        value: https://zerodha-clone-backend-c0ze.onrender.com
      - key: REACT_APP_DASHBOARD_URL
        value: https://zerodha-clone-dashboard-jwe7.onrender.com

  - type: web
    name: Zerodha-clone-dashboard
    runtime: static
    rootDir: dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: build
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: REACT_APP_API_URL
        value: https://zerodha-clone-backend-c0ze.onrender.com
